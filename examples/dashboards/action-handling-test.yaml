# Action handling test dashboard â€” issue #437 / PR #431
#
# Exercises `actions` (card-level), `entity.tap_action` (icon-level), the
# split-tap pattern, `hide_room_icon`, `full_card_actions`, and the deprecated
# `navigate` shorthand. Each card's title (area_name) says what it tests and
# what SHOULD happen on click.
#
# The bug (#437): with `hide_room_icon` enabled, the hidden icon box covering
# the card body ignored `actions.tap_action` and always used the room entity's
# default navigate (e.g. /lovelace/dining-room) instead of the configured path
# (e.g. a hash path like #dining-room).
#
# Usage: Settings â†’ Dashboards â†’ Add Dashboard â†’ â‹® â†’ Raw configuration editor â†’
# paste this file. Swap areas/entities for your own if needed.

title: Room Summary Card Action Test
views:
  - title: Room Summary Card Action Test
    type: sections
    max_columns: 3
    sections:
      #################################################
      # BASELINE â€” no `actions` configured
      #################################################
      - type: grid
        cards:
          - type: heading
            heading: 'Baseline (no actions)'
            heading_style: title

          # No actions at all.
          # Expect: icon AND title tap â†’ navigate to /<area-with-dashes>;
          # hold â†’ more-info; double tap â†’ nothing.
          - type: custom:room-summary-card
            area: dining_room
            area_name: 'Default: tapâ†’/dining-room'

          # Deprecated root-level navigate shorthand.
          # Expect: icon AND title tap â†’ navigate to /foo.
          - type: custom:room-summary-card
            area: dining_room
            area_name: 'navigate: tapâ†’/foo (deprecated)'
            navigate: foo

      #################################################
      # CARD-LEVEL `actions` + SPLIT TAP
      #################################################
      - type: grid
        cards:
          - type: heading
            heading: 'actions + split tap'
            heading_style: title

          # actions only â€” applies to the info area (title/stats).
          # Expect: TITLE tap â†’ /patio. ICON tap â†’ default /dining-room
          # (split behavior is documented; icon keeps entity actions).
          - type: custom:room-summary-card
            area: patio
            area_name: 'actions: titleâ†’/patio, iconâ†’/bar'
            actions:
              tap_action:
                action: navigate
                navigation_path: bar

          # Full split tap: navigate on title, toggle on icon.
          # Expect: TITLE tap â†’ /test-target. ICON tap â†’ toggles the light.
          - type: custom:room-summary-card
            area: living_room
            area_name: 'split: titleâ†’nav, iconâ†’toggle'
            entity:
              entity_id: input_boolean.test_toggle
              tap_action:
                action: toggle
            actions:
              tap_action:
                action: navigate
                navigation_path: living_room

          # Hold/double-tap overrides via actions.
          # Expect on TITLE: tap â†’ default nav, hold â†’ toggle, double tap â†’ more-info.
          # Expect on ICON: defaults (tap nav, hold more-info, double none).
          - type: custom:room-summary-card
            area: dining_room
            area_name: 'actions: title holdâ†’toggle, dblâ†’more-info'
            actions:
              hold_action:
                action: toggle
              double_tap_action:
                action: more-info

      #################################################
      # THE BUG â€” hide_room_icon + actions (#437)
      #################################################
      - type: grid
        cards:
          - type: heading
            heading: 'hide_room_icon (#437)'
            heading_style: title

          # THE ISSUE: hidden icon box should respect actions.tap_action.
          # BEFORE fix: tap on card body â†’ /dining-room (wrong).
          # AFTER fix: tap on card body â†’ #test-hash (same as title).
          - type: custom:room-summary-card
            area: dining_room
            area_name: 'BUG: body tapâ†’#test-hash (not /dining-room)'
            features:
              - hide_room_icon
            actions:
              tap_action:
                action: navigate
                navigation_path: '#test-hash'

          # hide_room_icon + split-tap config: with the icon hidden, the box is
          # just card body, so `actions` wins over entity.tap_action there.
          # AFTER fix: body tap â†’ /baz (NOT toggle). Hold â†’ more-info
          # (entity default, since actions doesn't set hold).
          - type: custom:room-summary-card
            area: dining_room
            area_name: 'hidden+split: bodyâ†’/baz'
            features:
              - hide_room_icon
            entity:
              entity_id: input_boolean.test_toggle
              tap_action:
                action: toggle
            actions:
              tap_action:
                action: navigate
                navigation_path: baz

          # hide_room_icon WITHOUT actions â€” regression check.
          # Expect (unchanged): body tap â†’ /dining-room, hold â†’ more-info.
          - type: custom:room-summary-card
            area: dining_room
            area_name: 'hidden, no actions: bodyâ†’/dining-room'
            features:
              - hide_room_icon

          # hide_room_icon + entity tap_action only â€” regression check.
          # Expect (unchanged): body tap â†’ toggles the light.
          - type: custom:room-summary-card
            area: dining_room
            area_name: 'hidden, entity toggle: bodyâ†’toggle'
            features:
              - hide_room_icon
            entity:
              entity_id: input_boolean.test_toggle
              tap_action:
                action: toggle

      #################################################
      # full_card_actions â€” overlay merge (regression)
      #################################################
      - type: grid
        cards:
          - type: heading
            heading: 'full_card_actions'
            heading_style: title

          # Overlay uses merged actions.
          # Expect: tap ANYWHERE â†’ #test-hash. Hold anywhere â†’ more-info.
          - type: custom:room-summary-card
            area: dining_room
            area_name: 'overlay: anywhereâ†’#test-hash'
            features:
              - full_card_actions
            actions:
              tap_action:
                action: navigate
                navigation_path: '#test-hash'

          # Overlay without actions â€” entity config drives it.
          # Expect: tap anywhere â†’ toggles the light.
          - type: custom:room-summary-card
            area: dining_room
            area_name: 'overlay, no actions: anywhereâ†’toggle'
            features:
              - full_card_actions
            entity:
              entity_id: input_boolean.test_toggle
              tap_action:
                action: toggle
